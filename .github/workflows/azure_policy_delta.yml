name: Azure Policy Delta

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

defaults:
  run:
    working-directory: azure-policy

jobs:
  detect-delta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          find . -maxdepth 4 -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Azure Policy delta check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/check_azure_policy_delta_pipeline.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-policy-delta-report
          path: azure-policy/reports/latest-report.md
          if-no-files-found: error

      - name: Commit changed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add config/baseline.json config/policy_status.json reports/latest-report.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Azure Policy baseline and status"
            git push
          fi
